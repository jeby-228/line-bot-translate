name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - "cursor/**"
      - "feat/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Format check
        run: just fmt-check

      - name: Lint
        run: just lint

      - name: Unit tests
        run: just test

  hurl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run Hurl tests in containers
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from hurl

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down

